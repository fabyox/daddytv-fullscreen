<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body,html { margin:0; padding:0; background:black; overflow:hidden; }
iframe { width:100%; height:100%; border:0; }
</style>
</head>
<body>

<iframe id="frame" allow="autoplay; fullscreen" src=""></iframe>

<script>
const url = new URL(window.location.href).searchParams.get("u");
const frame = document.getElementById("frame");
frame.src = url;

// Simula un "tap" per sbloccare autoplay
function simulateUserGesture() {
    try {
        const doc = frame.contentWindow.document;
        const video = doc.querySelector("video");
        if (video) {
            video.muted = false;
            video.play().catch(()=>{});
            video.requestFullscreen().catch(()=>{});
        }
    } catch(e){}
}

// Ritenta ogni 500ms finché non parte
setInterval(simulateUserGesture, 500);
</script>

</body>
</html>
